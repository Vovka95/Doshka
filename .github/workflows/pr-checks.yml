name: PR Checks

on:
    pull_request:
        branches:
            - dev
            - main

jobs:
    webclient:
        name: WebClient - lint, build, test
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: webClient

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
                  cache-dependency-path: webClient/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Lint
              run: npm run lint

            - name: Build
              run: npm run build

            # - name: Test
            #   run: npm test -- --runInBand

    webapi:
        name: WebApi - lint, build, test
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: webApi

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
                  cache-dependency-path: webApi/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Lint
              run: npm run lint

            - name: Build
              run: npm run build

            # - name: Test
            #   run: npm test -- --runInBand
