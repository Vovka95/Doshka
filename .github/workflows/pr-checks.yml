name: PR Checks

on:
    pull_request:
        branches:
            - dev
            - main

jobs:
    webclient:
        name: WebClient - lint, build, test
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
                  cache-dependency-path: webClient/package-lock.json

            - name: Install dependencies
              run: npm ci
              working-directory: webClient

            - name: Lint
              run: npm run lint
              working-directory: webClient

            - name: Build
              run: npm run build
              working-directory: webClient

            # - name: Test
            #   run: npm test -- --runInBand

    webapi:
        name: WebApi - lint, build, test
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
                  cache-dependency-path: webApi/package-lock.json

            - name: Install dependencies
              run: npm ci
              working-directory: webApi

            - name: Lint
              run: npm run lint
              working-directory: webApi

            - name: Build
              run: npm run build
              working-directory: webApi

            # - name: Test
            #   run: npm test -- --runInBand
